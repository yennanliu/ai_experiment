<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    h1 { margin-bottom: .25rem; color: #f59e0b; font-size: 1.8rem; }
    .subtitle { color: #888; margin-bottom: 1.5rem; font-size: .9rem; }
    .container { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 1rem; }
    textarea { width: 100%; padding: .75rem; border: 1px solid #333; border-radius: 8px; background: #1a1a24; color: #e0e0e0; font-size: .95rem; resize: vertical; min-height: 60px; }
    .controls { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; }
    button { padding: .6rem 1.4rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: .2s; font-size: .9rem; }
    .btn-generate { background: #f59e0b; color: #0f0f13; }
    .btn-generate:hover { background: #d97706; }
    .btn-generate:disabled { opacity: .5; cursor: wait; }
    .btn-play { background: #10b981; color: #fff; display: none; }
    .btn-play:hover { background: #059669; }
    .btn-stop { background: #ef4444; color: #fff; display: none; }
    .btn-stop:hover { background: #dc2626; }
    .btn-download { background: #6366f1; color: #fff; display: none; }
    .btn-download:hover { background: #4f46e5; }
    .spinner { display: none; }
    .spinner.show { display: inline-block; }
    .spinner::after { content: ""; display: inline-block; width: 18px; height: 18px; border: 2px solid #f59e0b; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sheet-music { background: #fff; border-radius: 8px; padding: 1rem; min-height: 80px; display: none; }
    .sheet-music.show { display: block; }
    .abc-box { background: #1a1a24; border: 1px solid #333; border-radius: 8px; padding: .75rem; font-family: monospace; font-size: .8rem; white-space: pre-wrap; max-height: 200px; overflow-y: auto; display: none; }
    .abc-box.show { display: block; }
    .label { font-size: .75rem; color: #888; text-transform: uppercase; letter-spacing: .05em; }
    .title-display { color: #f59e0b; font-size: 1.1rem; font-weight: 600; display: none; }
    .title-display.show { display: block; }
    .presets { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .5rem; }
    .preset { padding: .35rem .8rem; border: 1px solid #333; border-radius: 16px; background: #1a1a24; color: #aaa; cursor: pointer; font-size: .8rem; transition: .2s; }
    .preset:hover { border-color: #f59e0b; color: #f59e0b; }
    .status { font-size: .8rem; color: #10b981; display: none; }
    .status.show { display: block; }
  </style>
</head>
<body>
  <h1>Music Generator</h1>
  <p class="subtitle">Describe the music you want — AI composes it, you play it</p>

  <div class="container">
    <div class="presets">
      <span class="preset" onclick="usePreset(this)">happy jazz piano</span>
      <span class="preset" onclick="usePreset(this)">melancholic waltz in Am</span>
      <span class="preset" onclick="usePreset(this)">irish folk jig</span>
      <span class="preset" onclick="usePreset(this)">classical minuet in G</span>
      <span class="preset" onclick="usePreset(this)">blues in Bb</span>
      <span class="preset" onclick="usePreset(this)">lullaby for guitar</span>
    </div>

    <textarea id="prompt" placeholder="Describe the music you want... e.g. 'a cheerful Celtic reel in D major'" rows="2"></textarea>

    <div class="controls">
      <button class="btn-generate" id="btn-gen" onclick="generate()">Generate</button>
      <button class="btn-play" id="btn-play" onclick="play()">Play</button>
      <button class="btn-stop" id="btn-stop" onclick="stop()">Stop</button>
      <button class="btn-download" id="btn-download">Download .abc</button>
      <span id="spinner" class="spinner"></span>
    </div>

    <div class="status" id="status"></div>
    <div class="title-display" id="title"></div>
    <div class="sheet-music" id="sheet"></div>

    <div class="label" id="abc-label" style="display:none">ABC Notation</div>
    <div class="abc-box" id="abc-output"></div>
  </div>

  <script>
    let currentAbc = '';
    let currentFilename = '';
    let audioCtx = null;
    let midiBuffer = null;
    let isPlaying = false;

    function usePreset(el) {
      document.getElementById('prompt').value = el.textContent;
    }

    function showStatus(msg) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    async function generate() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return;

      const btn = document.getElementById('btn-gen');
      const spinner = document.getElementById('spinner');
      btn.disabled = true;
      spinner.classList.add('show');
      stop();

      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        currentAbc = data.abc;
        currentFilename = data.filename;

        // Title
        const titleEl = document.getElementById('title');
        titleEl.textContent = data.title;
        titleEl.classList.add('show');

        // Sheet music
        const sheetEl = document.getElementById('sheet');
        sheetEl.classList.add('show');
        ABCJS.renderAbc('sheet', currentAbc, { responsive: 'resize', staffwidth: 600 });

        // ABC notation
        const abcEl = document.getElementById('abc-output');
        abcEl.textContent = currentAbc;
        abcEl.classList.add('show');
        document.getElementById('abc-label').style.display = 'block';

        // Show buttons
        document.getElementById('btn-play').style.display = '';
        document.getElementById('btn-download').style.display = '';

        showStatus('Saved to output/' + data.filename);
      } catch (e) {
        alert('Error: ' + e.message);
      }

      btn.disabled = false;
      spinner.classList.remove('show');
    }

    async function play() {
      if (!currentAbc || isPlaying) return;

      try {
        // AudioContext must be created/resumed from user gesture
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          await audioCtx.resume();
        }

        const visualObj = ABCJS.renderAbc('sheet', currentAbc, { responsive: 'resize' })[0];
        midiBuffer = new ABCJS.synth.CreateSynth();

        await midiBuffer.init({
          visualObj: visualObj,
          audioContext: audioCtx,
          options: { soundFontUrl: 'https://paulrosen.github.io/midi-js-soundfonts/FluidR3_GM/' }
        });

        await midiBuffer.prime();
        midiBuffer.start();
        isPlaying = true;

        document.getElementById('btn-play').style.display = 'none';
        document.getElementById('btn-stop').style.display = '';

        // Reset when playback ends
        midiBuffer.onEnded = () => {
          isPlaying = false;
          document.getElementById('btn-play').style.display = '';
          document.getElementById('btn-stop').style.display = 'none';
        };
      } catch (e) {
        console.error('Audio playback error:', e);
        showStatus('Playback error: ' + e.message);
      }
    }

    function stop() {
      if (midiBuffer && isPlaying) {
        midiBuffer.stop();
      }
      isPlaying = false;
      midiBuffer = null;
      document.getElementById('btn-play').style.display = currentAbc ? '' : 'none';
      document.getElementById('btn-stop').style.display = 'none';
    }

    // Download
    document.getElementById('btn-download').addEventListener('click', () => {
      if (currentFilename) {
        window.open('/download/' + encodeURIComponent(currentFilename), '_blank');
      }
    });

    // Enter to generate
    document.getElementById('prompt').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
    });
  </script>
</body>
</html>
