<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangChain App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    h1 { margin-bottom: 1.5rem; color: #a78bfa; }
    .tabs { display: flex; gap: .5rem; margin-bottom: 1rem; }
    .tab { padding: .5rem 1.2rem; border: 1px solid #333; border-radius: 8px; cursor: pointer; background: #1a1a24; transition: .2s; }
    .tab.active { background: #a78bfa; color: #0f0f13; border-color: #a78bfa; }
    .panel { display: none; width: 100%; max-width: 640px; }
    .panel.active { display: flex; flex-direction: column; gap: 1rem; }
    textarea, input[type=text] { width: 100%; padding: .75rem; border: 1px solid #333; border-radius: 8px; background: #1a1a24; color: #e0e0e0; font-size: .95rem; resize: vertical; }
    textarea { min-height: 48px; }
    button.send { align-self: flex-end; padding: .6rem 1.5rem; border: none; border-radius: 8px; background: #a78bfa; color: #0f0f13; font-weight: 600; cursor: pointer; transition: .2s; }
    button.send:hover { background: #8b6fdf; }
    button.send:disabled { opacity: .5; cursor: wait; }
    .output { background: #1a1a24; border: 1px solid #333; border-radius: 8px; padding: 1rem; white-space: pre-wrap; line-height: 1.6; min-height: 60px; }
    .label { font-size: .8rem; color: #888; text-transform: uppercase; letter-spacing: .05em; }
    .spinner { display: none; align-self: center; }
    .spinner.show { display: inline-block; }
    .spinner::after { content: ""; display: inline-block; width: 20px; height: 20px; border: 2px solid #a78bfa; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>LangChain App</h1>

  <div class="tabs">
    <div class="tab active" data-panel="chat">Chat</div>
    <div class="tab" data-panel="research">Research</div>
  </div>

  <!-- Chat -->
  <div id="chat" class="panel active">
    <textarea id="chat-input" placeholder="Ask anything..." rows="2"></textarea>
    <div style="display:flex; align-items:center; gap:.75rem;">
      <button class="send" onclick="sendChat()">Send</button>
      <span id="chat-spinner" class="spinner"></span>
    </div>
    <div class="label">Response</div>
    <div id="chat-output" class="output">—</div>
  </div>

  <!-- Research -->
  <div id="research" class="panel">
    <input type="text" id="research-input" placeholder="Enter a topic...">
    <div style="display:flex; align-items:center; gap:.75rem;">
      <button class="send" onclick="sendResearch()">Research</button>
      <span id="research-spinner" class="spinner"></span>
    </div>
    <div class="label">Research</div>
    <div id="research-facts" class="output">—</div>
    <div class="label">Summary</div>
    <div id="research-summary" class="output">—</div>
  </div>

  <script>
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.panel).classList.add('active');
      });
    });

    async function sendChat() {
      const input = document.getElementById('chat-input');
      const output = document.getElementById('chat-output');
      const spinner = document.getElementById('chat-spinner');
      const msg = input.value.trim();
      if (!msg) return;

      spinner.classList.add('show');
      output.textContent = '...';
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        output.textContent = data.reply;
      } catch (e) {
        output.textContent = 'Error: ' + e.message;
      }
      spinner.classList.remove('show');
    }

    async function sendResearch() {
      const input = document.getElementById('research-input');
      const facts = document.getElementById('research-facts');
      const summary = document.getElementById('research-summary');
      const spinner = document.getElementById('research-spinner');
      const topic = input.value.trim();
      if (!topic) return;

      spinner.classList.add('show');
      facts.textContent = '...';
      summary.textContent = '...';
      try {
        const res = await fetch('/research', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic })
        });
        const data = await res.json();
        facts.textContent = data.research;
        summary.textContent = data.summary;
      } catch (e) {
        facts.textContent = 'Error: ' + e.message;
        summary.textContent = '';
      }
      spinner.classList.remove('show');
    }

    // Enter to send
    document.getElementById('chat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    });
    document.getElementById('research-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') { sendResearch(); }
    });
  </script>
</body>
</html>
