services:
  mlflow:
    build: .
    image: mlflow-poc:local
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=2)",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:////data/mlflow.db
      - --default-artifact-root
      - /data/artifacts
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --allowed-hosts
      - "mlflow,mlflow:5000,localhost,127.0.0.1,127.0.0.1:5000"
    volumes:
      - mlflow_data:/data
    ports:
      - "5000:5000"

  train-demo:
    build: .
    image: mlflow-poc:local
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: mfpoc-iris
      MFPOC_RUN_NAME: compose-demo
    command: ["mfpoc-train"]

volumes:
  mlflow_data:
