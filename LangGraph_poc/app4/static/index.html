<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PrivateAssist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e8e8e8; height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px; border-bottom: 1px solid #222;
    background: #141414;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  .badge {
    margin-left: auto; font-size: 12px; background: #1a2e1a;
    color: #4caf50; border: 1px solid #2d5a2d; border-radius: 20px;
    padding: 4px 12px; display: flex; align-items: center; gap: 6px;
  }
  .badge::before { content: "●"; font-size: 8px; }

  /* Layout */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 240px; border-right: 1px solid #222; background: #141414;
    display: flex; flex-direction: column; padding: 16px; gap: 16px;
    overflow-y: auto;
  }
  .sidebar h2 { font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .08em; color: #666; }

  .collection-list { display: flex; flex-direction: column; gap: 4px; }
  .collection-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
    font-size: 14px; color: #ccc; transition: background .15s;
  }
  .collection-item:hover { background: #1e1e1e; }
  .collection-item.active { background: #1e3a5f; color: #fff; }
  .collection-item .del { color: #555; font-size: 12px; cursor: pointer; }
  .collection-item .del:hover { color: #e55; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed #333; border-radius: 8px; padding: 16px;
    text-align: center; font-size: 13px; color: #666;
    cursor: pointer; transition: border-color .2s, color .2s;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: #4a90d9; color: #4a90d9; }
  .upload-zone input { display: none; }

  input[type=text], select {
    width: 100%; padding: 8px 10px; border-radius: 6px;
    border: 1px solid #333; background: #1e1e1e; color: #e8e8e8;
    font-size: 13px;
  }
  input[type=text]:focus, select:focus { outline: none; border-color: #4a90d9; }

  button {
    padding: 8px 14px; border-radius: 6px; border: none;
    cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity .15s;
  }
  button:hover { opacity: .85; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: #2563eb; color: #fff; width: 100%; }
  .btn-sm { background: #2a2a2a; color: #ccc; padding: 6px 12px; }

  /* Chat area */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .chat-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px; border-bottom: 1px solid #222; background: #141414;
  }
  .chat-header label { font-size: 13px; color: #888; }
  .chat-header select { width: auto; }

  .messages {
    flex: 1; overflow-y: auto; padding: 24px 32px; display: flex;
    flex-direction: column; gap: 20px;
  }

  .msg { max-width: 720px; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }

  .msg .bubble {
    padding: 12px 16px; border-radius: 12px; font-size: 14px;
    line-height: 1.6; white-space: pre-wrap;
  }
  .msg.user .bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: #1e1e1e; color: #e8e8e8; border-bottom-left-radius: 4px; }

  .sources { margin-top: 6px; font-size: 12px; color: #555; }
  .sources span { background: #1a1a2e; color: #7aa2d4; border-radius: 4px;
    padding: 2px 8px; margin-right: 4px; display: inline-block; }

  .step-indicator { font-size: 12px; color: #555; padding: 4px 0; }

  .input-row {
    display: flex; gap: 10px; padding: 16px 32px;
    border-top: 1px solid #222; background: #141414;
  }
  .input-row input { flex: 1; padding: 10px 14px; font-size: 14px; }
  .input-row button { padding: 10px 20px; background: #2563eb; color: #fff;
    border-radius: 8px; font-size: 14px; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #444; gap: 10px;
  }
  .empty-state svg { opacity: .3; }
</style>
</head>
<body>

<header>
  <svg width="22" height="22" fill="none" viewBox="0 0 24 24">
    <rect x="3" y="11" width="18" height="11" rx="2" stroke="#4a90d9" stroke-width="1.8"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#4a90d9" stroke-width="1.8" stroke-linecap="round"/>
  </svg>
  <h1>PrivateAssist</h1>
  <div class="badge">Local Only — No cloud</div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <h2>Collections</h2>
      <div class="collection-list" id="collectionList"></div>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px">
      <h2>Upload Document</h2>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".pdf,.txt,.md" />
        <div id="uploadLabel">Drop PDF / TXT / MD<br>or click to browse</div>
      </div>
      <input type="text" id="collectionInput" placeholder="Collection name" />
      <button class="btn-primary" id="uploadBtn" onclick="uploadFile()">Upload & Ingest</button>
      <div id="uploadStatus" style="font-size:12px;color:#888;min-height:16px"></div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="chat-header">
      <label>Collection:</label>
      <select id="chatCollection">
        <option value="">— select —</option>
      </select>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24">
          <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z" stroke="#666" stroke-width="1.5"/>
          <path d="M12 8v4m0 4h.01" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p>Upload documents, then ask a question</p>
      </div>
    </div>

    <div class="input-row">
      <input type="text" id="questionInput" placeholder="Ask a question about your documents…" onkeydown="if(event.key==='Enter')sendMessage()" />
      <button id="sendBtn" onclick="sendMessage()">Ask</button>
    </div>
  </div>
</div>

<script>
let selectedCollection = null;

// ── Collections ───────────────────────────────────────────────────────────────
async function loadCollections() {
  const res = await fetch('/collections');
  const { collections } = await res.json();
  renderCollections(collections);
  updateChatSelect(collections);
}

function renderCollections(cols) {
  const list = document.getElementById('collectionList');
  list.innerHTML = cols.map(c => `
    <div class="collection-item ${c === selectedCollection ? 'active' : ''}" onclick="selectCollection('${c}')">
      <span>${c}</span>
      <span class="del" onclick="event.stopPropagation();deleteCollection('${c}')">✕</span>
    </div>
  `).join('') || '<div style="font-size:13px;color:#555">No collections yet</div>';
}

function updateChatSelect(cols) {
  const sel = document.getElementById('chatCollection');
  const current = sel.value;
  sel.innerHTML = '<option value="">— select —</option>' +
    cols.map(c => `<option value="${c}" ${c===current?'selected':''}>${c}</option>`).join('');
  if (selectedCollection) sel.value = selectedCollection;
}

function selectCollection(name) {
  selectedCollection = name;
  document.getElementById('chatCollection').value = name;
  loadCollections();
}

async function deleteCollection(name) {
  if (!confirm(`Delete collection "${name}"?`)) return;
  await fetch(`/collections/${encodeURIComponent(name)}`, { method: 'DELETE' });
  if (selectedCollection === name) selectedCollection = null;
  loadCollections();
}

// ── Upload ────────────────────────────────────────────────────────────────────
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag');
  document.getElementById('fileInput').files = e.dataTransfer.files;
  document.getElementById('uploadLabel').textContent = e.dataTransfer.files[0].name;
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) document.getElementById('uploadLabel').textContent = e.target.files[0].name;
});

async function uploadFile() {
  const file = document.getElementById('fileInput').files[0];
  const collection = document.getElementById('collectionInput').value.trim();
  const status = document.getElementById('uploadStatus');

  if (!file) { status.textContent = 'Please select a file.'; return; }
  if (!collection) { status.textContent = 'Please enter a collection name.'; return; }

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  status.textContent = 'Ingesting…';

  const form = new FormData();
  form.append('file', file);
  form.append('collection', collection);

  try {
    const res = await fetch('/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (res.ok) {
      status.textContent = `✓ ${data.chunks} chunks ingested`;
      document.getElementById('uploadLabel').textContent = 'Drop PDF / TXT / MD\nor click to browse';
      document.getElementById('fileInput').value = '';
      selectCollection(collection);
      loadCollections();
    } else {
      status.textContent = `Error: ${data.detail}`;
    }
  } catch (e) {
    status.textContent = `Error: ${e.message}`;
  } finally {
    btn.disabled = false;
  }
}

// ── Chat ──────────────────────────────────────────────────────────────────────
function addMsg(role, text, sources) {
  document.getElementById('emptyState')?.remove();
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="bubble"></div>`;
  if (sources?.length) {
    div.innerHTML += `<div class="sources">Sources: ${sources.map(s=>`<span>${s}</span>`).join('')}</div>`;
  }
  box.appendChild(div);
  div.querySelector('.bubble').textContent = text;
  box.scrollTop = box.scrollHeight;
  return div.querySelector('.bubble');
}

function addStep(text) {
  document.getElementById('emptyState')?.remove();
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'step-indicator';
  div.id = 'currentStep';
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

async function sendMessage() {
  const input = document.getElementById('questionInput');
  const q = input.value.trim();
  const collection = document.getElementById('chatCollection').value;
  if (!q) return;
  if (!collection) { alert('Select a collection first.'); return; }

  input.value = '';
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', q);
  const stepEl = addStep('⟳ Retrieving relevant chunks…');

  const res = await fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question: q, collection }),
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let assistantBubble = null;
  let answerAccum = '';
  let finalSources = [];

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    const lines = decoder.decode(value).split('\n');
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = JSON.parse(line.slice(6));

      if (data.step === 'retrieved') {
        stepEl.textContent = `⟳ Generating answer from ${data.count} chunks…`;
        finalSources = data.sources;
      } else if (data.step === 'generating') {
        stepEl.remove();
        assistantBubble = addMsg('assistant', '').parentElement.querySelector('.bubble');
      } else if (data.step === 'token' && assistantBubble) {
        answerAccum += data.token;
        assistantBubble.textContent = answerAccum;
        document.getElementById('messages').scrollTop = 9999;
      } else if (data.step === 'done') {
        stepEl.remove?.();
        if (!assistantBubble) {
          addMsg('assistant', data.answer, data.sources);
        } else {
          // append sources
          const src = document.createElement('div');
          src.className = 'sources';
          src.innerHTML = 'Sources: ' + finalSources.map(s=>`<span>${s}</span>`).join('');
          assistantBubble.parentElement.appendChild(src);
        }
      }
    }
  }

  document.getElementById('sendBtn').disabled = false;
  document.getElementById('questionInput').focus();
}

// Init
loadCollections();
</script>
</body>
</html>
