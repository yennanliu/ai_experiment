<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enterprise Knowledge Base</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; min-height: 100vh; }

  header {
    background: #1a1a2e; color: #fff; padding: 1rem 2rem;
    display: flex; align-items: center; gap: 1rem;
  }
  header h1 { font-size: 1.25rem; font-weight: 600; }
  header span { font-size: 0.8rem; opacity: 0.6; }

  .layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 56px); }

  /* Sidebar */
  .sidebar { background: #fff; border-right: 1px solid #e2e8f0; padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }
  .sidebar h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .08em; color: #718096; }

  .collection-select { width: 100%; padding: .5rem .75rem; border: 1px solid #cbd5e0; border-radius: 8px; font-size: .9rem; background: #f7fafc; }
  .new-col { display: flex; gap: .5rem; margin-top: .5rem; }
  .new-col input { flex: 1; padding: .4rem .6rem; border: 1px solid #cbd5e0; border-radius: 6px; font-size: .85rem; }
  .btn { cursor: pointer; padding: .4rem .8rem; border: none; border-radius: 6px; font-size: .85rem; font-weight: 500; }
  .btn-primary { background: #4f46e5; color: #fff; }
  .btn-primary:hover { background: #4338ca; }
  .btn-danger { background: #fed7d7; color: #c53030; }
  .btn-danger:hover { background: #feb2b2; }

  .upload-zone { border: 2px dashed #cbd5e0; border-radius: 10px; padding: 1.2rem; text-align: center; cursor: pointer; transition: border-color .2s; }
  .upload-zone:hover, .upload-zone.drag { border-color: #4f46e5; background: #eef2ff; }
  .upload-zone p { font-size: .8rem; color: #718096; margin-top: .4rem; }
  #file-input { display: none; }
  .status-msg { font-size: .8rem; color: #4a5568; margin-top: .5rem; min-height: 1.2em; }
  .status-msg.ok { color: #2f855a; }
  .status-msg.err { color: #c53030; }

  /* Chat */
  .chat-panel { display: flex; flex-direction: column; }
  .messages { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1rem; }

  .msg { max-width: 780px; line-height: 1.6; }
  .msg.user { align-self: flex-end; background: #4f46e5; color: #fff; padding: .75rem 1rem; border-radius: 12px 12px 2px 12px; }
  .msg.bot { align-self: flex-start; background: #fff; border: 1px solid #e2e8f0; padding: .75rem 1rem; border-radius: 12px 12px 12px 2px; }
  .msg .sources { font-size: .75rem; color: #718096; margin-top: .5rem; }

  .input-bar { padding: 1rem 2rem; background: #fff; border-top: 1px solid #e2e8f0; display: flex; gap: .75rem; }
  .input-bar textarea { flex: 1; resize: none; padding: .6rem .9rem; border: 1px solid #cbd5e0; border-radius: 8px; font-size: .95rem; font-family: inherit; line-height: 1.4; }
  .input-bar textarea:focus { outline: none; border-color: #4f46e5; }
  #send-btn { align-self: flex-end; padding: .65rem 1.2rem; }

  .thinking { display: flex; gap: 4px; align-items: center; padding: .75rem 1rem; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #a0aec0; animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1} }

  .empty-state { margin: auto; text-align: center; color: #a0aec0; }
  .empty-state svg { width: 56px; height: 56px; margin-bottom: .75rem; opacity: .4; }
  .empty-state p { font-size: .9rem; }
</style>
</head>
<body>
<header>
  <h1>Enterprise Knowledge Base</h1>
  <span>RAG · LangGraph · OpenAI</span>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <section>
      <h2>Knowledge Base</h2>
      <select id="collection-select" class="collection-select"></select>
      <div class="new-col">
        <input id="new-col-input" placeholder="New collection…" />
        <button class="btn btn-primary" onclick="addCollection()">+</button>
      </div>
      <button class="btn btn-danger" style="margin-top:.5rem;width:100%" onclick="deleteCollection()">Delete selected</button>
    </section>

    <section>
      <h2>Upload Document</h2>
      <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="1.5" width="32" height="32"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12V4m0 0L8 8m4-4 4 4"/></svg>
        <p>PDF, TXT or MD<br/>Click or drag & drop</p>
      </div>
      <input type="file" id="file-input" accept=".pdf,.txt,.md" onchange="uploadFile(this.files[0])" />
      <div id="upload-status" class="status-msg"></div>
    </section>
  </aside>

  <!-- Chat -->
  <main class="chat-panel">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <p>Upload documents, then ask anything.</p>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="question" rows="1" placeholder="Ask a question about your documents…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button class="btn btn-primary" id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </main>
</div>

<script>
const collectionSelect = document.getElementById('collection-select');
const messagesEl = document.getElementById('messages');
const emptyState = document.getElementById('empty-state');
const uploadStatus = document.getElementById('upload-status');

// ── Collections ──────────────────────────────────────────────────────────────

async function loadCollections() {
  const res = await fetch('/collections');
  const cols = await res.json();
  collectionSelect.innerHTML = '';
  if (!cols.length) {
    const opt = new Option('default', 'default');
    collectionSelect.add(opt);
  } else {
    cols.forEach(c => collectionSelect.add(new Option(c, c)));
  }
}

function addCollection() {
  const val = document.getElementById('new-col-input').value.trim();
  if (!val) return;
  if (![...collectionSelect.options].find(o => o.value === val)) {
    collectionSelect.add(new Option(val, val));
  }
  collectionSelect.value = val;
  document.getElementById('new-col-input').value = '';
}

async function deleteCollection() {
  const name = collectionSelect.value;
  if (!confirm(`Delete collection "${name}"?`)) return;
  await fetch(`/collections/${name}`, { method: 'DELETE' });
  await loadCollections();
}

// ── Upload ───────────────────────────────────────────────────────────────────

async function uploadFile(file) {
  if (!file) return;
  uploadStatus.textContent = `Uploading ${file.name}…`;
  uploadStatus.className = 'status-msg';

  const fd = new FormData();
  fd.append('file', file);
  fd.append('collection', collectionSelect.value);

  try {
    const res = await fetch('/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (res.ok) {
      uploadStatus.textContent = `✓ ${data.file} — ${data.chunks} chunks indexed`;
      uploadStatus.className = 'status-msg ok';
      if (![...collectionSelect.options].find(o => o.value === data.collection)) {
        collectionSelect.add(new Option(data.collection, data.collection));
        collectionSelect.value = data.collection;
      }
    } else {
      uploadStatus.textContent = `✗ ${data.error}`;
      uploadStatus.className = 'status-msg err';
    }
  } catch (e) {
    uploadStatus.textContent = `✗ ${e.message}`;
    uploadStatus.className = 'status-msg err';
  }
}

// Drag & drop
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  uploadFile(e.dataTransfer.files[0]);
});

// ── Chat ─────────────────────────────────────────────────────────────────────

function appendMsg(role, html, sources) {
  emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = html;
  if (sources && sources.length) {
    const s = document.createElement('div');
    s.className = 'sources';
    s.textContent = `Sources: ${sources.join(', ')}`;
    div.appendChild(s);
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showThinking() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'thinking';
  div.innerHTML = '<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

async function sendMessage() {
  const q = document.getElementById('question').value.trim();
  if (!q) return;
  document.getElementById('question').value = '';
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', escapeHtml(q));
  showThinking();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, collection: collectionSelect.value }),
    });
    const data = await res.json();
    document.getElementById('thinking')?.remove();

    if (res.ok) {
      appendMsg('bot', escapeHtml(data.answer), data.sources);
    } else {
      appendMsg('bot', `<em>Error: ${escapeHtml(data.error || 'unknown')}</em>`);
    }
  } catch (e) {
    document.getElementById('thinking')?.remove();
    appendMsg('bot', `<em>Network error: ${escapeHtml(e.message)}</em>`);
  }

  document.getElementById('send-btn').disabled = false;
}

// Init
loadCollections();
</script>
</body>
</html>
