<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enterprise Knowledge Base</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; min-height: 100vh; }

  header {
    background: #1a1a2e; color: #fff; padding: 0 2rem;
    height: 52px; display: flex; align-items: center; gap: 1rem;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header .badge { font-size: .72rem; background: #4f46e5; padding: .2rem .55rem; border-radius: 99px; opacity: .9; }
  header .spacer { flex: 1; }
  .toggle-debug { font-size: .8rem; color: #a5b4fc; cursor: pointer; border: 1px solid #4f46e5; padding: .25rem .7rem; border-radius: 6px; background: transparent; }
  .toggle-debug:hover { background: #4f46e5; color: #fff; }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr 0px;
    grid-template-rows: calc(100vh - 52px);
    transition: grid-template-columns .25s ease;
  }
  .layout.debug-open { grid-template-columns: 260px 1fr 360px; }

  /* ── Sidebar ── */
  .sidebar {
    background: #fff; border-right: 1px solid #e2e8f0;
    padding: 1.25rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto;
  }
  .sidebar h2 { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: #94a3b8; margin-bottom: .35rem; }

  select.col-sel { width: 100%; padding: .45rem .7rem; border: 1px solid #cbd5e0; border-radius: 7px; font-size: .875rem; background: #f8fafc; }
  .row { display: flex; gap: .4rem; margin-top: .4rem; }
  .row input { flex: 1; padding: .38rem .6rem; border: 1px solid #cbd5e0; border-radius: 6px; font-size: .82rem; }
  .btn { cursor: pointer; padding: .38rem .75rem; border: none; border-radius: 6px; font-size: .82rem; font-weight: 500; transition: background .15s; }
  .btn-primary { background: #4f46e5; color: #fff; }
  .btn-primary:hover { background: #4338ca; }
  .btn-danger { background: #fee2e2; color: #b91c1c; }
  .btn-danger:hover { background: #fecaca; }
  .btn-ghost { background: #f1f5f9; color: #475569; }
  .btn-ghost:hover { background: #e2e8f0; }

  .upload-zone {
    border: 2px dashed #cbd5e0; border-radius: 10px; padding: 1rem;
    text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: #4f46e5; background: #eef2ff; }
  .upload-zone p { font-size: .75rem; color: #94a3b8; margin-top: .35rem; }
  #file-input { display: none; }
  .status-msg { font-size: .78rem; color: #64748b; margin-top: .4rem; min-height: 1.1em; }
  .status-msg.ok { color: #15803d; }
  .status-msg.err { color: #dc2626; }

  label.cfg { font-size: .78rem; color: #64748b; display: flex; justify-content: space-between; margin-bottom: .25rem; }
  input[type=range] { width: 100%; accent-color: #4f46e5; }

  /* ── Chat ── */
  .chat-panel { display: flex; flex-direction: column; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: .9rem; }

  .msg { max-width: 720px; line-height: 1.65; font-size: .9rem; }
  .msg.user {
    align-self: flex-end; background: #4f46e5; color: #fff;
    padding: .65rem 1rem; border-radius: 14px 14px 3px 14px;
  }
  .msg.bot {
    align-self: flex-start; background: #fff; border: 1px solid #e2e8f0;
    padding: .7rem 1rem; border-radius: 14px 14px 14px 3px;
  }
  .msg-meta { display: flex; gap: .6rem; align-items: center; margin-top: .4rem; flex-wrap: wrap; }
  .tag { font-size: .7rem; padding: .15rem .5rem; border-radius: 99px; font-weight: 500; }
  .tag-source { background: #ede9fe; color: #5b21b6; }
  .tag-chunks { background: #e0f2fe; color: #0369a1; }
  .tag-inspect { background: #f1f5f9; color: #475569; cursor: pointer; }
  .tag-inspect:hover { background: #e2e8f0; }

  .input-bar { padding: .85rem 1.5rem; background: #fff; border-top: 1px solid #e2e8f0; display: flex; gap: .6rem; align-items: flex-end; }
  .input-bar textarea {
    flex: 1; resize: none; padding: .55rem .85rem; border: 1px solid #cbd5e0;
    border-radius: 8px; font-size: .9rem; font-family: inherit; line-height: 1.45; max-height: 120px;
  }
  .input-bar textarea:focus { outline: none; border-color: #4f46e5; }

  .thinking { display: flex; gap: 4px; align-items: center; padding: .5rem .6rem; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.25} 40%{opacity:1} }

  .empty-state { margin: auto; text-align: center; color: #cbd5e0; }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: .6rem; }
  .empty-state p { font-size: .85rem; }

  /* ── Debug Panel ── */
  .debug-panel {
    background: #0f172a; color: #e2e8f0; font-size: .78rem;
    overflow: hidden; display: flex; flex-direction: column;
    border-left: 1px solid #1e293b;
  }
  .debug-header {
    padding: .75rem 1rem; background: #1e293b; font-weight: 600; font-size: .8rem;
    color: #94a3b8; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .debug-header span { color: #38bdf8; }
  .debug-body { flex: 1; overflow-y: auto; padding: .75rem 1rem; display: flex; flex-direction: column; gap: 1rem; }

  .debug-section h3 { font-size: .7rem; text-transform: uppercase; letter-spacing: .07em; color: #475569; margin-bottom: .4rem; }

  .chunk-card {
    background: #1e293b; border: 1px solid #334155; border-radius: 6px;
    padding: .55rem .7rem; margin-bottom: .4rem;
  }
  .chunk-card .chunk-meta { color: #64748b; font-size: .7rem; margin-bottom: .3rem; }
  .chunk-card .chunk-text { color: #cbd5e0; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

  .debug-empty { color: #334155; font-style: italic; text-align: center; padding: 2rem 0; }

  .pipeline-step {
    display: flex; align-items: center; gap: .5rem;
    padding: .3rem 0; border-bottom: 1px solid #1e293b;
  }
  .pipeline-step:last-child { border-bottom: none; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .step-dot.done { background: #22c55e; }
  .step-dot.pending { background: #334155; }
  .step-label { color: #94a3b8; }
  .step-val { margin-left: auto; color: #38bdf8; font-family: monospace; }
</style>
</head>
<body>
<header>
  <h1>Enterprise Knowledge Base</h1>
  <span class="badge">RAG · LangGraph · OpenAI</span>
  <div class="spacer"></div>
  <button class="toggle-debug" onclick="toggleDebug()">🔍 Debug</button>
</header>

<div class="layout" id="layout">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <section>
      <h2>Knowledge Base</h2>
      <select id="col-sel" class="col-sel"></select>
      <div class="row">
        <input id="new-col" placeholder="New collection…" onkeydown="if(event.key==='Enter')addCollection()" />
        <button class="btn btn-primary" onclick="addCollection()">+</button>
      </div>
      <button class="btn btn-danger" style="margin-top:.4rem;width:100%" onclick="deleteCollection()">Delete selected</button>
    </section>

    <section>
      <h2>Upload Document</h2>
      <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="1.5" width="28" height="28"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12V4m0 0L8 8m4-4 4 4"/></svg>
        <p>PDF, TXT or MD · click or drop</p>
      </div>
      <input type="file" id="file-input" accept=".pdf,.txt,.md" onchange="uploadFile(this.files[0])" />
      <div id="upload-status" class="status-msg"></div>
    </section>

    <section>
      <h2>Retrieval Config</h2>
      <label class="cfg">Top-K chunks <span id="k-val">5</span></label>
      <input type="range" id="k-range" min="1" max="10" value="5"
        oninput="document.getElementById('k-val').textContent=this.value" />
    </section>
  </aside>

  <!-- ── Chat ── -->
  <main class="chat-panel">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <p>Upload a document, then ask anything.</p>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="question" rows="1" placeholder="Ask a question about your documents…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button class="btn btn-primary" id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </main>

  <!-- ── Debug Panel ── -->
  <aside class="debug-panel" id="debug-panel">
    <div class="debug-header">
      Debug <span id="debug-title">—</span>
    </div>
    <div class="debug-body" id="debug-body">
      <div class="debug-empty">Send a message to inspect the RAG pipeline.</div>
    </div>
  </aside>
</div>

<script>
const colSel = document.getElementById('col-sel');
const messagesEl = document.getElementById('messages');
const emptyState = document.getElementById('empty-state');
const uploadStatus = document.getElementById('upload-status');
const layout = document.getElementById('layout');
let debugOpen = false;
let lastChunks = [];

// ── Debug ────────────────────────────────────────────────────────────────────

function toggleDebug() {
  debugOpen = !debugOpen;
  layout.classList.toggle('debug-open', debugOpen);
}

function renderDebug(data, question) {
  const body = document.getElementById('debug-body');
  const title = document.getElementById('debug-title');
  title.textContent = `${data.chunks_used} chunks · ${data.sources?.length || 0} sources`;

  const steps = [
    { label: 'retrieve_node', val: `${data.chunks_used} chunks`, done: true },
    { label: 'generate_node', val: data.sources?.join(', ') || '—', done: true },
  ];

  const pipelineHtml = steps.map(s => `
    <div class="pipeline-step">
      <div class="step-dot done"></div>
      <span class="step-label">${s.label}</span>
      <span class="step-val">${escapeHtml(s.val)}</span>
    </div>`).join('');

  const chunksHtml = (data.chunks || []).map((c, i) => `
    <div class="chunk-card">
      <div class="chunk-meta">#${i + 1} · ${escapeHtml(c.source)}</div>
      <div class="chunk-text">${escapeHtml(c.text)}</div>
    </div>`).join('');

  body.innerHTML = `
    <div class="debug-section">
      <h3>Pipeline</h3>
      ${pipelineHtml}
    </div>
    <div class="debug-section">
      <h3>Retrieved Chunks (${data.chunks_used})</h3>
      ${chunksHtml || '<div class="debug-empty">No chunks retrieved.</div>'}
    </div>`;
}

// ── Collections ──────────────────────────────────────────────────────────────

async function loadCollections() {
  const res = await fetch('/collections');
  const cols = await res.json();
  colSel.innerHTML = '';
  (cols.length ? cols : ['default']).forEach(c => colSel.add(new Option(c, c)));
}

function addCollection() {
  const val = document.getElementById('new-col').value.trim();
  if (!val) return;
  if (![...colSel.options].find(o => o.value === val)) colSel.add(new Option(val, val));
  colSel.value = val;
  document.getElementById('new-col').value = '';
}

async function deleteCollection() {
  const name = colSel.value;
  if (!confirm(`Delete collection "${name}"?`)) return;
  await fetch(`/collections/${name}`, { method: 'DELETE' });
  await loadCollections();
}

// ── Upload ───────────────────────────────────────────────────────────────────

async function uploadFile(file) {
  if (!file) return;
  uploadStatus.textContent = `Uploading ${file.name}…`;
  uploadStatus.className = 'status-msg';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('collection', colSel.value);
  try {
    const res = await fetch('/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (res.ok) {
      uploadStatus.textContent = `✓ ${data.file} — ${data.chunks} chunks indexed`;
      uploadStatus.className = 'status-msg ok';
      if (![...colSel.options].find(o => o.value === data.collection)) {
        colSel.add(new Option(data.collection, data.collection));
        colSel.value = data.collection;
      }
    } else {
      uploadStatus.textContent = `✗ ${data.error}`;
      uploadStatus.className = 'status-msg err';
    }
  } catch (e) {
    uploadStatus.textContent = `✗ ${e.message}`;
    uploadStatus.className = 'status-msg err';
  }
}

const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); uploadFile(e.dataTransfer.files[0]); });

// ── Chat ─────────────────────────────────────────────────────────────────────

function escapeHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function appendMsg(role, html, meta) {
  emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = html;
  if (meta) {
    const row = document.createElement('div');
    row.className = 'msg-meta';
    if (meta.sources?.length) {
      meta.sources.forEach(s => {
        const t = document.createElement('span');
        t.className = 'tag tag-source';
        t.textContent = s;
        row.appendChild(t);
      });
    }
    if (meta.chunks_used != null) {
      const t = document.createElement('span');
      t.className = 'tag tag-chunks';
      t.textContent = `${meta.chunks_used} chunks`;
      row.appendChild(t);
    }
    if (meta.data) {
      const t = document.createElement('span');
      t.className = 'tag tag-inspect';
      t.textContent = 'Inspect ↗';
      t.onclick = () => { if (!debugOpen) toggleDebug(); renderDebug(meta.data); };
      row.appendChild(t);
    }
    div.appendChild(row);
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showThinking() {
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'thinking';
  div.innerHTML = '<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const q = document.getElementById('question').value.trim();
  const k = parseInt(document.getElementById('k-range').value);
  if (!q) return;
  document.getElementById('question').value = '';
  document.getElementById('send-btn').disabled = true;
  appendMsg('user', escapeHtml(q));
  showThinking();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, collection: colSel.value, k }),
    });
    const data = await res.json();
    document.getElementById('thinking')?.remove();

    if (res.ok) {
      appendMsg('bot', escapeHtml(data.answer), { sources: data.sources, chunks_used: data.chunks_used, data });
      if (debugOpen) renderDebug(data, q);
    } else {
      appendMsg('bot', `<em>Error: ${escapeHtml(data.error || 'unknown')}</em>`);
    }
  } catch (e) {
    document.getElementById('thinking')?.remove();
    appendMsg('bot', `<em>Network error: ${escapeHtml(e.message)}</em>`);
  }
  document.getElementById('send-btn').disabled = false;
}

loadCollections();
</script>
</body>
</html>
