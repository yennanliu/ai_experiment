<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Email Reply Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header span { font-size: 13px; color: #888; flex: 1; }
    header a { font-size: 13px; color: #0071e3; text-decoration: none; font-weight: 500; }
    header a:hover { text-decoration: underline; }

    .container {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card h2 { font-size: 14px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .05em; }

    textarea {
      width: 100%;
      height: 220px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      resize: vertical;
      font-family: inherit;
      line-height: 1.6;
      transition: border-color .2s;
    }
    textarea:focus { outline: none; border-color: #0071e3; }

    .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    button {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: opacity .15s;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: #0071e3; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #0077ed; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-secondary:hover:not(:disabled) { background: #e5e5e5; }

    .status-bar {
      font-size: 13px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }
    .dot.running { background: #f5a623; animation: pulse 1s infinite; }
    .dot.done    { background: #34c759; }
    .dot.error   { background: #ff3b30; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-new-po      { background: #d1f0ff; color: #006fa6; }
    .badge-change      { background: #fff3cd; color: #856404; }
    .badge-wrong       { background: #ffe0e0; color: #c0392b; }
    .badge-inventory   { background: #e8f5e9; color: #2e7d32; }
    .badge-shipment    { background: #f3e5f5; color: #6a1b9a; }
    .badge-quote       { background: #fff8e1; color: #f57f17; }
    .badge-other       { background: #e8e8e8; color: #555; }

    .draft-box {
      background: #f9f9fb;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      min-height: 220px;
      color: #1d1d1f;
    }
    .draft-box.empty { color: #aaa; font-style: italic; }

    /* Confidence score */
    .score-row { display: flex; align-items: center; gap: 12px; }
    .score-bar-wrap {
      flex: 1;
      background: #e8e8e8;
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }
    .score-bar {
      height: 100%;
      border-radius: 999px;
      transition: width .5s ease;
    }
    .score-label { font-size: 13px; font-weight: 700; min-width: 36px; text-align: right; }
    .score-reason { font-size: 12px; color: #777; font-style: italic; }

    .checklist { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .checklist li {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 7px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .checklist li.missing { background: #fff8e1; color: #7a5c00; }
    .checklist li.risk    { background: #ffeaea; color: #a00; }
    .checklist li.ok      { background: #edfaf2; color: #1a7a3c; }
    .checklist li::before { font-size: 15px; flex-shrink: 0; }
    .checklist li.missing::before { content: "⚠️"; }
    .checklist li.risk::before    { content: "🚩"; }
    .checklist li.ok::before      { content: "✅"; }

    .full-width { grid-column: 1 / -1; }

    .copy-btn {
      align-self: flex-end;
      padding: 6px 14px;
      font-size: 12px;
    }

    select {
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      background: #fff;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #0071e3; }

    .meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  </style>
</head>
<body>

<header>
  <h1>AI Email Reply Assistant</h1>
  <span>FastAPI + LangGraph + GPT-4o</span>
  <a href="/history-page">History →</a>
</header>

<div class="container">

  <!-- Input -->
  <div class="card">
    <h2>Inbound Email</h2>

    <div class="actions">
      <select id="mockSelect">
        <option value="">— Load mock email —</option>
      </select>
    </div>

    <textarea id="emailInput" placeholder="Paste inbound email here…"></textarea>

    <div class="actions">
      <button class="btn-primary" id="generateBtn" onclick="generate()">Generate Draft</button>
      <button class="btn-secondary" onclick="clearAll()">Clear</button>
      <div class="status-bar">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Idle</span>
      </div>
    </div>
  </div>

  <!-- Output -->
  <div class="card">
    <h2>Reply Draft</h2>
    <div class="meta-row">
      <span style="font-size:13px;color:#888;">Type:</span>
      <span id="emailTypeBadge"></span>
    </div>

    <!-- Confidence score -->
    <div>
      <div style="font-size:12px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;">Confidence Score</div>
      <div class="score-row">
        <div class="score-bar-wrap">
          <div class="score-bar" id="scoreBar" style="width:0%;background:#ccc;"></div>
        </div>
        <div class="score-label" id="scoreLabel">—</div>
      </div>
      <div class="score-reason" id="scoreReason" style="margin-top:5px;"></div>
    </div>

    <div class="draft-box empty" id="draftBox">Draft will appear here…</div>
    <button class="btn-secondary copy-btn" onclick="copyDraft()">Copy Draft</button>
  </div>

  <!-- Checklist -->
  <div class="card full-width">
    <h2>Review Checklist</h2>
    <ul class="checklist" id="checklist">
      <li class="ok">No issues flagged yet.</li>
    </ul>
  </div>

</div>

<script>
  const MOCK_EMAILS = [];

  async function loadMocks() {
    try {
      const res = await fetch('/mock-emails');
      const data = await res.json();
      MOCK_EMAILS.push(...data);
      const sel = document.getElementById('mockSelect');
      data.forEach((m, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = m.label;
        sel.appendChild(opt);
      });
    } catch (e) { console.warn('Could not load mock emails', e); }
  }

  document.getElementById('mockSelect').addEventListener('change', function () {
    const idx = this.value;
    if (idx === '') return;
    document.getElementById('emailInput').value = MOCK_EMAILS[idx].email;
    this.value = '';
  });

  function setStatus(state, text) {
    const dot = document.getElementById('statusDot');
    dot.className = 'dot ' + state;
    document.getElementById('statusText').textContent = text;
  }

  function badgeClass(type) {
    if (type === 'New PO')                      return 'badge badge-new-po';
    if (type === 'Change Order')                return 'badge badge-change';
    if (type === 'Wrong Order / Quality Issue') return 'badge badge-wrong';
    if (type === 'Inventory Inquiry')           return 'badge badge-inventory';
    if (type === 'Shipment Inquiry')            return 'badge badge-shipment';
    if (type === 'New Quote')                   return 'badge badge-quote';
    return 'badge badge-other';
  }

  function scoreColor(n) {
    if (n >= 80) return '#34c759';
    if (n >= 60) return '#f5a623';
    return '#ff3b30';
  }

  function renderScore(score, reason) {
    const bar = document.getElementById('scoreBar');
    const label = document.getElementById('scoreLabel');
    const reasonEl = document.getElementById('scoreReason');
    bar.style.width = score + '%';
    bar.style.background = scoreColor(score);
    label.textContent = score;
    label.style.color = scoreColor(score);
    reasonEl.textContent = reason || '';
  }

  async function generate() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) return;

    document.getElementById('generateBtn').disabled = true;
    setStatus('running', 'Generating…');

    try {
      const res = await fetch('/generate-draft', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();

      // Type badge
      const badge = document.getElementById('emailTypeBadge');
      badge.textContent = data.email_type;
      badge.className = badgeClass(data.email_type);

      // Confidence score
      renderScore(data.confidence_score, data.confidence_reason);

      // Draft
      const box = document.getElementById('draftBox');
      box.textContent = data.draft_reply;
      box.classList.remove('empty');

      // Checklist
      const list = document.getElementById('checklist');
      list.innerHTML = '';
      if (!data.checklist.length) {
        list.innerHTML = '<li class="ok">All checks passed — no issues found.</li>';
      } else {
        data.checklist.forEach(item => {
          const li = document.createElement('li');
          li.textContent = item;
          li.className = item.startsWith('Missing') ? 'missing' : 'risk';
          list.appendChild(li);
        });
      }

      setStatus('done', 'Done');
    } catch (err) {
      setStatus('error', err.message);
    } finally {
      document.getElementById('generateBtn').disabled = false;
    }
  }

  function clearAll() {
    document.getElementById('emailInput').value = '';
    document.getElementById('draftBox').textContent = 'Draft will appear here…';
    document.getElementById('draftBox').classList.add('empty');
    document.getElementById('emailTypeBadge').textContent = '';
    document.getElementById('emailTypeBadge').className = '';
    document.getElementById('checklist').innerHTML = '<li class="ok">No issues flagged yet.</li>';
    document.getElementById('scoreBar').style.width = '0%';
    document.getElementById('scoreLabel').textContent = '—';
    document.getElementById('scoreReason').textContent = '';
    setStatus('', 'Idle');
  }

  function copyDraft() {
    const text = document.getElementById('draftBox').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy Draft', 1500);
    });
  }

  loadMocks();
</script>

</body>
</html>
